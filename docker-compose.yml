# Implemented in feature/issue-6-docker
# See Issue #6 for the full spec

services:
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3
    depends_on:
      - ollama

volumes:
  ollama_data:
